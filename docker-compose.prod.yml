services:
  # ─────────────────────────────────────────────────────────────
  # PHP-FPM Application
  # ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ploom_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./writable:/var/www/html/writable
    environment:
      CI_ENVIRONMENT: ${CI_ENVIRONMENT:-production}
      app.baseURL: ${APP_BASE_URL:-https://awfa.dev/}
      app.appTimezone: ${APP_TIMEZONE:-Asia/Jakarta}
      database.default.hostname: db
      database.default.database: ${DB_DATABASE:-fintrack_db}
      database.default.username: ${DB_USERNAME:-ploom}
      database.default.password: ${DB_PASSWORD:-ploom_secret}
      database.default.DBDriver: MySQLi
      database.default.port: 3306
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://awfa.dev/auth/google/callback}
      email.fromEmail: ${MAIL_FROM_EMAIL:-}
      email.fromName: ${MAIL_FROM_NAME:-PLOOM Auth}
      email.protocol: smtp
      email.SMTPHost: ${MAIL_SMTP_HOST:-smtp.googlemail.com}
      email.SMTPUser: ${MAIL_SMTP_USER:-}
      email.SMTPPass: ${MAIL_SMTP_PASS:-}
      email.SMTPPort: ${MAIL_SMTP_PORT:-587}
      email.SMTPCrypto: tls
      email.mailType: html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ploom_network

  # ─────────────────────────────────────────────────────────────
  # Nginx Web Server + SSL
  # ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ploom_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/certbot/conf:/etc/letsencrypt:ro
      - ./docker/certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - ploom_network

  # ─────────────────────────────────────────────────────────────
  # Certbot - SSL Certificate (Let's Encrypt)
  # ─────────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: ploom_certbot
    volumes:
      - ./docker/certbot/conf:/etc/letsencrypt
      - ./docker/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - ploom_network

  # ─────────────────────────────────────────────────────────────
  # MySQL Database
  # ─────────────────────────────────────────────────────────────
  db:
    image: mysql:8.4
    container_name: ploom_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${DB_DATABASE:-fintrack_db}
      MYSQL_USER: ${DB_USERNAME:-ploom}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ploom_secret}
    volumes:
      - ploom_db_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:${DB_PORT:-3307}:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secret}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ploom_network

volumes:
  ploom_db_data:
    driver: local

networks:
  ploom_network:
    driver: bridge
